<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a7f37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0078d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6f42c1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGreen" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a7f37;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#1a7f37;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a4a" />
      <stop offset="100%" style="stop-color:#1a1a3a" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Accent bar bottom -->
  <rect x="0" y="590" width="1200" height="40" fill="url(#accent)" />

  <!-- Grid lines (subtle) -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="200" y1="0" x2="200" y2="590" />
    <line x1="400" y1="0" x2="400" y2="590" />
    <line x1="600" y1="0" x2="600" y2="590" />
    <line x1="800" y1="0" x2="800" y2="590" />
    <line x1="1000" y1="0" x2="1000" y2="590" />
  </g>

  <!-- Price chart line (background decoration) -->
  <g opacity="0.15">
    <polyline points="0,350 80,340 160,320 240,330 320,290 400,300 480,260 560,270 640,220 720,240 800,200 880,180 960,190 1040,150 1120,160 1200,120"
      fill="none" stroke="#1a7f37" stroke-width="3" />
    <polyline points="0,350 80,340 160,320 240,330 320,290 400,300 480,260 560,270 640,220 720,240 800,200 880,180 960,190 1040,150 1120,160 1200,120 1200,590 0,590"
      fill="url(#chartGreen)" stroke="none" />
  </g>

  <!-- Volume bars (background decoration) -->
  <g opacity="0.08" fill="#0078d4">
    <rect x="60" y="480" width="30" height="60" />
    <rect x="140" y="460" width="30" height="80" />
    <rect x="220" y="490" width="30" height="50" />
    <rect x="300" y="430" width="30" height="110" />
    <rect x="380" y="470" width="30" height="70" />
    <rect x="460" y="420" width="30" height="120" />
    <rect x="540" y="450" width="30" height="90" />
    <rect x="620" y="410" width="30" height="130" />
    <rect x="700" y="440" width="30" height="100" />
    <rect x="780" y="400" width="30" height="140" />
    <rect x="860" y="420" width="30" height="120" />
    <rect x="940" y="390" width="30" height="150" />
    <rect x="1020" y="410" width="30" height="130" />
    <rect x="1100" y="430" width="30" height="110" />
  </g>

  <!-- === LEFT SIDE: Architecture icons === -->

  <!-- Phone/MAUI App icon -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="70" height="120" rx="10" fill="url(#phoneGrad)" stroke="#0078d4" stroke-width="2" />
    <rect x="8" y="15" width="54" height="80" rx="3" fill="#0d1117" />
    <!-- App content lines -->
    <rect x="14" y="22" width="20" height="3" rx="1" fill="#1a7f37" />
    <rect x="14" y="30" width="42" height="3" rx="1" fill="#8b949e" />
    <rect x="14" y="38" width="35" height="3" rx="1" fill="#8b949e" />
    <rect x="14" y="48" width="18" height="12" rx="2" fill="#1a7f37" opacity="0.6" />
    <rect x="36" y="48" width="18" height="12" rx="2" fill="#da3633" opacity="0.6" />
    <rect x="14" y="66" width="42" height="3" rx="1" fill="#8b949e" />
    <rect x="14" y="74" width="30" height="3" rx="1" fill="#8b949e" />
    <!-- Home button -->
    <circle cx="35" cy="107" r="5" fill="none" stroke="#8b949e" stroke-width="1" />
    <text x="35" y="135" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="11">.NET MAUI</text>
  </g>

  <!-- Arrow from phone to service -->
  <g transform="translate(165, 155)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#0078d4" stroke-width="2" stroke-dasharray="4,3" />
    <polygon points="40,-5 50,0 40,5" fill="#0078d4" />
    <text x="25" y="-8" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">REST</text>
  </g>

  <!-- Cloud Service box -->
  <g transform="translate(220, 100)">
    <rect x="0" y="0" width="160" height="120" rx="8" fill="#161b22" stroke="#1a7f37" stroke-width="2" />
    <text x="80" y="-8" text-anchor="middle" fill="#1a7f37" font-family="Arial, sans-serif" font-size="11" font-weight="bold">☁️ ASP.NET Core</text>
    <!-- Service components -->
    <rect x="10" y="12" width="60" height="22" rx="4" fill="#1a7f37" opacity="0.2" stroke="#1a7f37" stroke-width="1" />
    <text x="40" y="27" text-anchor="middle" fill="#1a7f37" font-family="Arial, sans-serif" font-size="9">PV Scanner</text>
    <rect x="80" y="12" width="68" height="22" rx="4" fill="#0078d4" opacity="0.2" stroke="#0078d4" stroke-width="1" />
    <text x="114" y="27" text-anchor="middle" fill="#0078d4" font-family="Arial, sans-serif" font-size="9">ONNX Engine</text>
    <rect x="10" y="42" width="60" height="22" rx="4" fill="#d4760a" opacity="0.2" stroke="#d4760a" stroke-width="1" />
    <text x="40" y="57" text-anchor="middle" fill="#d4760a" font-family="Arial, sans-serif" font-size="9">Snapshots</text>
    <rect x="80" y="42" width="68" height="22" rx="4" fill="#6f42c1" opacity="0.2" stroke="#6f42c1" stroke-width="1" />
    <text x="114" y="57" text-anchor="middle" fill="#6f42c1" font-family="Arial, sans-serif" font-size="9">Spread Select</text>
    <rect x="10" y="72" width="60" height="22" rx="4" fill="#da3633" opacity="0.2" stroke="#da3633" stroke-width="1" />
    <text x="40" y="87" text-anchor="middle" fill="#da3633" font-family="Arial, sans-serif" font-size="9">FCM Push</text>
    <rect x="80" y="72" width="68" height="22" rx="4" fill="#8b949e" opacity="0.2" stroke="#8b949e" stroke-width="1" />
    <text x="114" y="87" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">WebSocket</text>
  </g>

  <!-- Arrow from service to broker -->
  <g transform="translate(395, 155)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#6f42c1" stroke-width="2" stroke-dasharray="4,3" />
    <polygon points="30,-5 40,0 30,5" fill="#6f42c1" />
  </g>

  <!-- Broker abstraction box -->
  <g transform="translate(440, 85)">
    <rect x="0" y="0" width="140" height="150" rx="8" fill="#161b22" stroke="#6f42c1" stroke-width="2" />
    <text x="70" y="-8" text-anchor="middle" fill="#6f42c1" font-family="Arial, sans-serif" font-size="11" font-weight="bold">🏦 IBroker</text>
    <!-- Three broker implementations -->
    <rect x="10" y="12" width="120" height="34" rx="4" fill="#1a7f37" opacity="0.15" stroke="#1a7f37" stroke-width="1" />
    <text x="70" y="27" text-anchor="middle" fill="#1a7f37" font-family="Arial, sans-serif" font-size="10">SchwabBroker</text>
    <text x="70" y="40" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="8">live API</text>
    <rect x="10" y="52" width="120" height="34" rx="4" fill="#0078d4" opacity="0.15" stroke="#0078d4" stroke-width="1" />
    <text x="70" y="67" text-anchor="middle" fill="#0078d4" font-family="Arial, sans-serif" font-size="10">PaperTrading</text>
    <text x="70" y="80" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="8">real quotes, fake fills</text>
    <rect x="10" y="92" width="120" height="34" rx="4" fill="#d4760a" opacity="0.15" stroke="#d4760a" stroke-width="1" />
    <text x="70" y="107" text-anchor="middle" fill="#d4760a" font-family="Arial, sans-serif" font-size="10">SimulatedBroker</text>
    <text x="70" y="120" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="8">fully offline</text>
  </g>

  <!-- Database icons row -->
  <!-- PostgreSQL -->
  <g transform="translate(80, 280)">
    <ellipse cx="35" cy="10" rx="35" ry="10" fill="#0078d4" opacity="0.3" stroke="#0078d4" stroke-width="1.5" />
    <rect x="0" y="10" width="70" height="40" fill="#161b22" stroke="#0078d4" stroke-width="1.5" />
    <ellipse cx="35" cy="50" rx="35" ry="10" fill="#161b22" stroke="#0078d4" stroke-width="1.5" />
    <text x="35" y="37" text-anchor="middle" fill="#0078d4" font-family="Arial, sans-serif" font-size="10">PostgreSQL</text>
    <text x="35" y="75" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Cloud DB</text>
  </g>

  <!-- Docker -->
  <g transform="translate(190, 280)">
    <rect x="0" y="5" width="70" height="50" rx="6" fill="#161b22" stroke="#0078d4" stroke-width="1.5" />
    <!-- Docker whale body -->
    <g transform="translate(35, 25)">
      <!-- Container boxes -->
      <rect x="-18" y="-8" width="8" height="7" rx="1" fill="#0078d4" opacity="0.6" />
      <rect x="-8" y="-8" width="8" height="7" rx="1" fill="#0078d4" opacity="0.6" />
      <rect x="2" y="-8" width="8" height="7" rx="1" fill="#0078d4" opacity="0.6" />
      <rect x="-18" y="1" width="8" height="7" rx="1" fill="#0078d4" opacity="0.6" />
      <rect x="-8" y="1" width="8" height="7" rx="1" fill="#0078d4" opacity="0.6" />
      <rect x="2" y="1" width="8" height="7" rx="1" fill="#0078d4" opacity="0.6" />
      <!-- Whale shape -->
      <path d="M-22,10 Q-22,18 0,18 Q20,18 22,12 L25,10 Q22,8 20,10" fill="none" stroke="#0078d4" stroke-width="1.5" />
    </g>
    <text x="35" y="75" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Docker</text>
  </g>

  <!-- SQLite -->
  <g transform="translate(300, 280)">
    <ellipse cx="35" cy="10" rx="30" ry="8" fill="#d4760a" opacity="0.3" stroke="#d4760a" stroke-width="1.5" />
    <rect x="5" y="10" width="60" height="35" fill="#161b22" stroke="#d4760a" stroke-width="1.5" />
    <ellipse cx="35" cy="45" rx="30" ry="8" fill="#161b22" stroke="#d4760a" stroke-width="1.5" />
    <text x="35" y="33" text-anchor="middle" fill="#d4760a" font-family="Arial, sans-serif" font-size="10">SQLite</text>
    <text x="35" y="70" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">On-Device</text>
  </g>

  <!-- ML Pipeline -->
  <g transform="translate(420, 280)">
    <rect x="0" y="5" width="160" height="50" rx="6" fill="#161b22" stroke="#d4760a" stroke-width="1.5" />
    <!-- Brain icon -->
    <text x="25" y="37" text-anchor="middle" fill="#d4760a" font-family="Arial, sans-serif" font-size="18">🧠</text>
    <text x="100" y="27" text-anchor="middle" fill="#d4760a" font-family="Arial, sans-serif" font-size="10">ML Pipeline</text>
    <text x="100" y="42" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">XGBoost → LSTM → ONNX</text>
    <text x="80" y="75" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Python + C#</text>
  </g>

  <!-- === TITLE TEXT === -->
  <text x="600" y="430" text-anchor="middle" fill="#f5f5f5" font-family="Georgia, serif" font-size="46" font-weight="bold">StrikeAlert</text>
  <text x="600" y="478" text-anchor="middle" fill="#1a7f37" font-family="Georgia, serif" font-size="26">An AI-Assisted Options Trading App</text>
  <text x="600" y="515" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="16">.NET MAUI · ASP.NET Core · XGBoost · LSTM · Schwab API · Docker · PostgreSQL</text>
  <text x="600" y="545" text-anchor="middle" fill="#6f42c1" font-family="Arial, sans-serif" font-size="14">Built from scratch with GitHub Copilot</text>

  <!-- Decorative dots -->
  <circle cx="720" cy="90" r="3" fill="#1a7f37" opacity="0.5" />
  <circle cx="780" cy="110" r="2" fill="#0078d4" opacity="0.4" />
  <circle cx="850" cy="85" r="4" fill="#d4760a" opacity="0.3" />
  <circle cx="900" cy="105" r="2" fill="#6f42c1" opacity="0.5" />
  <circle cx="960" cy="90" r="3" fill="#1a7f37" opacity="0.3" />
  <circle cx="1020" cy="100" r="2" fill="#da3633" opacity="0.4" />
  <circle cx="1080" cy="88" r="3" fill="#0078d4" opacity="0.3" />

  <!-- Lightning bolt (alert icon) -->
  <g transform="translate(750, 160)">
    <polygon points="15,0 0,30 12,30 8,55 30,22 18,22 22,0" fill="#ffd700" opacity="0.7" />
  </g>

  <!-- Second lightning bolt -->
  <g transform="translate(950, 180)">
    <polygon points="10,0 0,20 8,20 5,38 20,15 12,15 15,0" fill="#ffd700" opacity="0.4" />
  </g>
</svg>
